<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerraForge Cloud</title>

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: url("assets/Panda.png") no-repeat center center fixed;
        background-size: cover;
        font-family: "Segoe UI", sans-serif;
    }

    /* TOP RIGHT LINKS */
    .top-links {
        position: absolute;
        top: 20px;
        right: 40px;
        font-size: 20px;
        font-weight: 600;
    }
    .top-links a {
        margin-left: 20px;
        color: #c77b30; /* brown */
        text-decoration: none;
    }
    .top-links a:hover {
        opacity: 0.6;
    }

    /* MAIN TITLE AREA */
    .center-box {
        position: absolute;
        top: 60%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
    }

    .title {
        font-size: 48px;
        font-weight: 700;
        color: #bfa4ff;
    }

    .subtitle {
        font-size: 20px;
        color: #e0e0e0;
        margin-top: -10px;
        margin-bottom: 20px;
    }

    .btn {
        padding: 12px 28px;
        background: linear-gradient(45deg, #6a82fb, #b46ff9);
        border-radius: 12px;
        color: black;
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        border: none;
    }

    /* FIXED SIDE ICONS */
    .icon-box {
        position: fixed;
        bottom: 40px;
        right: 30px;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .glass-icon {
        width: 65px;
        height: 65px;
        background: rgba(0,0,0,0.38);
        border-radius: 18px;
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }
    .glass-icon img {
        width: 70%;
        filter: drop-shadow(0 0 8px #00ffff);
    }

    /* HELICOPTER ANIMATION */
    #helicopter {
        position: absolute;
        top: 38%;
        left: -350px;
        width: 340px;
        pointer-events: none;
        animation: fly 12s linear infinite;
    }

    @keyframes fly {
        0%   { left: -350px; }
        45%  { left: 46%; }   /* Midpoint = trigger typing */
        60%  { left: 80%; }
        100% { left: 120%; }
    }

    /* WORK IN PROGRESS TEXT */
    #wip {
        position: absolute;
        bottom: 100px;
        width: 100%;
        text-align: center;
        font-size: 46px;
        font-weight: bold;
        color: white;
        opacity: 0;
    }

    /* Strobe effect */
    @keyframes strobe {
        0%   { color: red; }
        33%  { color: blue; }
        66%  { color: lime; }
        100% { color: white; }
    }
</style>
</head>

<body>

<!-- TOP LINKS -->
<div class="top-links">
    <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
    <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
</div>

<!-- MAIN CENTER TEXT -->
<div class="center-box">
    <div class="title">🐼 TerraForge Cloud</div>
    <div class="subtitle">Welcome — our next-gen cloud platform is under construction.</div>
    <button class="btn" onclick="window.open('https://github.com/sudhir81')">
        🔗 Explore My GitHub Work
    </button>
</div>

<!-- HELICOPTER -->
<img id="helicopter" src="assets/heli.png">

<!-- WORK IN PROGRESS ANIMATION TEXT -->
<div id="wip">WORK IN PROGRESS</div>

<!-- SIDE BUTTONS -->
<div class="icon-box">
    <div class="glass-icon" onclick="window.open('https://wa.me/918588818710')">
        <img src="assets/whatsapp.png">
    </div>
    <div class="glass-icon" onclick="window.location.href='mailto:support@terraforgecloud.com'">
        <img src="assets/email.png">
    </div>
</div>

<script>
/* 🔥 HELICOPTER MIDWAY TRIGGER + TYPEWRITER + STROBE + DELAY */
setInterval(() => {
    const heli = document.getElementById("helicopter");
    const wip = document.getElementById("wip");

    setTimeout(() => {
        wip.style.opacity = 1;
        wip.style.animation = "strobe 0.2s infinite";

    }, 5200); // mid-flight midpoint

    /* Hide text after 5s */
    setTimeout(() => {
        wip.style.opacity = 0;
        wip.style.animation = "none";
    }, 10500);

}, 12000);
</script>

</body>
</html>
