<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TerraForge Cloud — Coming Soon</title>

<style>
  :root{
    --fly-duration: 12s;            /* change to speed up/slow down heli */
    --heli-width: 340px;
    --wip-color1: #ff2b2b;          /* red */
    --wip-color2: #2b8bff;          /* blue */
    --wip-color3: #39ff6b;          /* green */
  }

  /* page reset */
  html,body{height:100%;margin:0;font-family:Inter, "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial;}
  body{
    background: #000; color:#fff;
    /* main panda background (cover full screen) */
    background-image: url("assets/Panda.png");
    background-size: cover;
    background-position: center center;
    background-attachment: fixed;
    overflow:hidden;
  }

  /* top-right links (brown) */
  .toplinks{
    position:fixed; right:32px; top:18px; z-index:60;
    display:flex; gap:18px; font-weight:600; color:#8a4f2a;
  }
  .toplinks a{ color: #8a4f2a; text-decoration:none; font-size:16px; }

  /* central title area - placed slightly below chin */
  .hero{
    position: absolute;
    left:50%;
    top:44%;                /* tweak this to sit 1/2" below chin */
    transform: translate(-50%, -10%);
    text-align:center;
    z-index:40;
    pointer-events:none;
    text-shadow: 0 6px 22px rgba(0,0,0,0.6);
  }
  .brand{
    display:flex; align-items:center; gap:14px; justify-content:center;
    font-size:62px; font-weight:800; color:#9fb1ff;
    letter-spacing: -1px;
    pointer-events:auto;
  }
  .brand-emoji{ font-size:46px; margin-top:-4px; }
  .subtitle{ margin-top:10px; color:rgba(255,255,255,0.92); font-size:18px; pointer-events:auto; }

  .cta{
    margin-top:22px;
    display:inline-block;
    pointer-events:auto;
  }
  .cta button{
    cursor:pointer; outline:none; border:none;
    padding:12px 28px; border-radius:14px;
    background: linear-gradient(90deg,#7aa3ff,#c392ff);
    font-weight:700; color:#02101b; font-size:15px;
    box-shadow: 0 8px 20px rgba(63,88,201,0.22), inset 0 -2px 0 rgba(255,255,255,0.05);
  }

  /* helicopter + rotor + smoke */
  #heliWrap{
    position:absolute; left:-500px; top:22%; width:var(--heli-width); z-index:50; pointer-events:none;
    transform: translateX(0);
    will-change: transform;
    animation: heliFly var(--fly-duration) linear infinite;
  }
  #heli { width:100%; display:block; filter: drop-shadow(0 24px 40px rgba(0,0,0,0.5)); }
  /* fake rotor blur (thin ellipse) */
  #rotorBlur{
    position:absolute; left:18%; top:-10px; width:72%; height:26px; border-radius:50%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.08), rgba(255,255,255,0));
    transform-origin:center center; animation: rotorSpin 0.12s linear infinite;
    filter: blur(2px) saturate(1.1);
    opacity:0.4;
    z-index:52;
    pointer-events:none;
  }

  /* exhaust smoke image trailing behind: will follow heli with delayed animation */
  #smokeTrail{
    position:absolute; width:360px; left:-650px; top:34%; z-index:45; opacity:0.95;
    transform-origin: left center;
    animation: smokeFly var(--fly-duration) linear infinite;
    filter: blur(1.2px) contrast(1.05) brightness(0.95);
    pointer-events:none;
  }

  /* keyframes for flight path */
  /* heliFly moves heli across the page; midpoint near 45% position triggers WIP */
  @keyframes heliFly {
    0%   { transform: translateX(-100vw); opacity:0; }
    10%  { opacity:1; }
    45%  { transform: translateX(46vw); }    /* midpoint trigger */
    60%  { transform: translateX(86vw); }
    100% { transform: translateX(140vw); opacity:0; }
  }
  /* smoke follows flight with slight trail (left-shifted) */
  @keyframes smokeFly {
    0%  { transform: translateX(-100vw) scale(0.9); opacity:0; }
    10% { opacity:0.9; }
    45% { transform: translateX(calc(46vw - 160px)) scale(1); } /* behind heli */
    60% { transform: translateX(calc(86vw - 240px)) scale(1.14); opacity:0.75; filter: blur(2px); }
    100%{ transform: translateX(calc(140vw - 320px)) scale(1.4); opacity:0; }
  }

  @keyframes rotorSpin {
    from{ transform: rotate(0deg) }
    to{ transform: rotate(360deg) }
  }

  /* WORK IN PROGRESS text (centered) */
  #wip {
    position: absolute;
    left:50%;
    top:58%;               /* place around center lower area; adjust to taste */
    transform: translate(-50%, -50%);
    font-size:48px;
    font-weight:900;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.06); /* default faint off-screen look */
    text-transform:uppercase;
    z-index:55;
    white-space:nowrap;
    text-shadow: 0 10px 30px rgba(0,0,0,0.6);
    pointer-events:none;
    opacity:0;
  }

  /* typewriter reveal characters via JS (span per char) */
  .wip-char{ opacity:0; display:inline-block; transform: translateY(8px); }

  /* strobe animation (RGB) applied by JS */
  @keyframes strobeRGB {
    0% { color: var(--wip-color1); text-shadow: 0 0 18px var(--wip-color1); }
    33%{ color: var(--wip-color2); text-shadow: 0 0 18px var(--wip-color2); }
    66%{ color: var(--wip-color3); text-shadow: 0 0 18px var(--wip-color3); }
    100%{ color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.18); }
  }

  /* small footer icons (glass + neon) - whatsapp & email */
  .contactIcons{
    position: fixed; right:20px; bottom:18px; z-index:70; display:flex; flex-direction:column; gap:14px;
  }
  .glass{
    width:64px; height:64px; border-radius:14px; display:flex; align-items:center; justify-content:center;
    background: rgba(6,10,18,0.40); backdrop-filter: blur(8px) saturate(1.1);
    box-shadow: 0 10px 30px rgba(6,10,18,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.03);
  }
  .glass img{ width:44px; height:44px; object-fit:contain; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.6)); }

  /* hide default invisible characters so page looks clean on load */
  .invisible { opacity:0; }

  /* responsive tweaks */
  @media (max-width:900px){
    .brand{ font-size:42px; }
    #wip{ font-size:34px; top:64%; }
    #heliWrap{ top:18%; width:260px; }
    #smokeTrail{ top:30%; width:260px; }
  }
</style>
</head>
<body>

  <!-- top links -->
  <div class="toplinks">
    <a href="https://github.com/sudhir81" target="_blank" rel="noopener">GitHub</a>
    <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank" rel="noopener">LinkedIn</a>
  </div>

  <!-- Hero content -->
  <div class="hero" aria-hidden="false">
    <div class="brand">
      <div class="brand-emoji">🐼</div>
      <div>TerraForge Cloud</div>
    </div>
    <div class="subtitle">Welcome — our next-gen cloud platform is under construction.</div>
    <div class="cta"><button onclick="window.open('https://github.com/sudhir81','_blank')">🔗 Explore My GitHub Work</button></div>
  </div>

  <!-- Helicopter (wrap for transform) -->
  <div id="heliWrap" aria-hidden="true">
    <div id="rotorBlur"></div>
    <img id="heli" src="assets/heli.png" alt="helicopter">
  </div>

  <!-- smoke trail (behind heli) -->
  <img id="smokeTrail" src="assets/smoke.png" alt="smoke trail">

  <!-- WORK IN PROGRESS (will be composed into spans by JS for typewriter) -->
  <div id="wip" aria-hidden="true"></div>

  <!-- floating contact icons -->
  <div class="contactIcons">
    <a class="glass" href="https://wa.me/918588818710" target="_blank" rel="noopener">
      <img src="assets/whatsapp.png" alt="WhatsApp" id="waIcon">
    </a>
    <a class="glass" href="mailto:support@terraforgecloud.com">
      <img src="assets/email.png" alt="Email" id="emIcon">
    </a>
  </div>

<script>
/*
  Main animation controller:
  - duration var must match the CSS --fly-duration for correct sync
  - we compute triggerTime = duration * 0.45 (45% point)
  - when helicopter reaches midpoint we run the typewriter then strobe.
*/
(function(){
  const flyDurationSec = 12;                 // seconds: must mirror CSS --fly-duration
  const triggerRatio = 0.45;                 // when heli is near midpoint (CSS uses 45%)
  const triggerMs = Math.round(flyDurationSec * 1000 * triggerRatio);
  const loopMs = flyDurationSec * 1000;

  const wipText = "WORK IN PROGRESS";
  const wipEl = document.getElementById("wip");
  const heli = document.getElementById("heliWrap");
  const smoke = document.getElementById("smokeTrail");

  // prepare typewriter spans
  function prepareWip(){
    wipEl.innerHTML = "";
    for(let i=0;i<wipText.length;i++){
      const span = document.createElement("span");
      span.className = "wip-char";
      span.textContent = wipText[i];
      wipEl.appendChild(span);
    }
  }
  prepareWip();

  // typewriter – reveal chars one by one
  function runTypewriter(){
    const chars = Array.from(wipEl.querySelectorAll(".wip-char"));
    // reset
    chars.forEach(c => { c.style.opacity = 0; c.style.transform="translateY(8px)"; });

    wipEl.style.opacity = 1;
    // set small initial fade-in
    wipEl.style.transition = "opacity 160ms linear";
    wipEl.style.opacity = 1;

    chars.forEach((c, idx) => {
      setTimeout(() => {
        c.style.transition = "opacity 120ms linear, transform 200ms cubic-bezier(.2,.9,.2,1)";
        c.style.opacity = 1;
        c.style.transform = "translateY(0)";
      }, idx * 80);
    });

    // after finished typing, trigger strobe for 5s, then fade out
    const strobeStart = chars.length * 80 + 150; // ms after typing starts
    setTimeout(() => {
      wipEl.style.animation = `strobeRGB 0.25s steps(1) infinite`;
      // keep strobe 5s
      setTimeout(() => {
        // stop strobe and fade out
        wipEl.style.animation = "";
        wipEl.style.transition = "opacity 600ms ease";
        wipEl.style.opacity = 0;
      }, 5000);
    }, strobeStart);
  }

  // We'll schedule the typewriter each time the heli animation passes the midpoint.
  // Use a repeating interval that mirrors the CSS animation loop.
  function scheduleLoop(){
    // run first iteration after triggerMs (T0 -> Tmid)
    setTimeout(() => {
      runTypewriter();
    }, triggerMs);

    // subsequent repeats
    setInterval(() => {
      // run typewriter each loop at triggerMs offset
      setTimeout(() => { runTypewriter(); }, triggerMs);
    }, loopMs);
  }

  // Small visual: rocker/tilt when helicopter passes midpoint (optional)
  function addMidEffects(){
    // rotate heli slightly when near center - subtle
    // not necessary, kept for realism
  }

  // Ensure icons load (fix for broken images): if missing, reduce opacity
  document.getElementById('waIcon').onerror = function(){ this.parentElement.style.opacity = 0.001; };
  document.getElementById('emIcon').onerror = function(){ this.parentElement.style.opacity = 0.001; };

  // start scheduling
  scheduleLoop();

  // (Optional) If you want heli speed changed programmatically, update flyDurationSec and the CSS variable.
  // But for now, keep CSS variable and JS in sync (12s).
})();
</script>

</body>
</html>
