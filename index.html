<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TerraForge Cloud – Coming Soon</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            text-align: center;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Full-screen panda background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("assets/Panda.png") no-repeat center center/cover;
            filter: blur(5px) brightness(0.45);
            z-index: -1;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(14px);
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: #9fc1ff;
            text-decoration: none;
            margin: 0 12px;
            font-weight: 500;
        }

        .logo {
            height: 45px;
        }

        .glass-card {
            max-width: 650px;
            margin: 80px auto 20px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 42px;
            margin-top: 10px;
            font-weight: 700;
            color: #dbe4ff;
        }

        .subtitle {
            margin-top: 10px;
            color: #e3e7f1;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #58a6ff;
            color: #000;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        /* Blinking WIP Image */
        .wip-container {
            margin-top: 40px;
        }

        .wip-image {
            width: 260px;
            animation: blink 1.3s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <div class="navbar">
        <img src="assets/logo.png" class="logo" alt="TerraForge Cloud Logo">
        <div>
            <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
        </div>
    </div>

    <!-- Center Glass Card -->
    <div class="glass-card">
        <h1>🐼 TerraForge Cloud</h1>
        <p class="subtitle">Welcome! Our next-gen cloud platform is under construction.</p>

        <a href="https://github.com/sudhir81" class="btn" target="_blank">🔗 Explore My GitHub Work</a>

        <div class="wip-container">
            <img src="assets/WIP.png" class="wip-image" alt="Work in Progress">
        </div>
    </div>

</body>
</html>
