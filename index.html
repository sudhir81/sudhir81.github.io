<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TerraForge Cloud – Coming Soon</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0a0f1f, #101b33);
            color: #ffffff;
            text-align: center;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: #9fc1ff;
            text-decoration: none;
            margin: 0 12px;
            font-weight: 500;
        }

        .logo {
            height: 45px;
        }

        .hero-image {
            width: 300px;
            margin-top: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 38px;
            font-weight: 700;
            margin-top: 10px;
            color: #9cb8ff;
        }

        .subtitle {
            margin-top: 5px;
            color: #d3d7e5;
            font-size: 16px;
        }

        .progress {
            width: 40%;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            margin: 20px auto;
            border-radius: 5px;
        }

        .progress-bar {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, #7da2ff, #b38bff);
            border-radius: 5px;
        }

        .countdown {
            margin-top: 15px;
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #58a6ff;
            color: #000;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .wip-image {
            width: 240px;
            margin-top: 20px;
            opacity: 0.95;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <div class="navbar">
        <img src="assets/logo.png" class="logo" alt="TerraForge Cloud Logo">
        <div>
            <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
        </div>
    </div>

    <!-- Panda Image -->
    <img src="assets/Panda.png" class="hero-image" alt="Panda">

    <h1>TerraForge Cloud</h1>

    <p class="subtitle">Welcome! Our next-gen cloud platform is almost ready.</p>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <p class="countdown">Launching In: 9 Days 23 Hours 59 Minutes</p>

    <a href="https://github.com/sudhir81" class="btn" target="_blank">Explore My GitHub Work</a>

    <!-- Work In Progress -->
    <img src="assets/WIP.png" class="wip-image" alt="Work in Progress">

</body>
</html>
