<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraForge Cloud – Coming Soon</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* FULL-SCREEN PANDA BACKGROUND */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("assets/Panda.png") no-repeat center center / cover;
            filter: brightness(0.45) blur(4px);
            z-index: -1;
        }

        /* NAV BAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: #bcd2ff;
            margin: 0 12px;
            text-decoration: none;
            font-weight: 500;
        }

        .logo {
            height: 42px;
        }

        /* CENTER GLASS CARD */
        .glass-card {
            max-width: 650px;
            margin: 80px auto 20px;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            border-radius: 18px;
            box-shadow: 0 8px 35px rgba(0, 0, 0, 0.45);
        }

        h1 {
            font-size: 42px;
            margin-top: 10px;
            font-weight: 700;
            color: #dbe4ff;
        }

        .subtitle {
            font-size: 18px;
            margin-top: 10px;
            color: #e6e9f5;
        }

        /* BUTTON */
        .btn {
            margin-top: 25px;
            padding: 14px 28px;
            background: #58a6ff;
            border-radius: 10px;
            text-decoration: none;
            color: #000;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
        }

        /* WIP IMAGE CENTER BOTTOM */
        .wip-container {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
        }

        .wip-image {
            width: 260px;
            animation: blink 1.3s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.35; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <img src="assets/logo.png" class="logo">
        <div>
            <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
        </div>
    </div>

    <div class="glass-card">
        <h1>🐼 TerraForge Cloud</h1>
        <p class="subtitle">Welcome! Our next-gen cloud platform is almost ready.</p>

        <a class="btn" href="https://github.com/sudhir81" target="_blank">🔗 Explore My GitHub Work</a>
    </div>

    <!-- BLINKING WIP PNG -->
    <div class="wip-container">
        <img src="assets/WIP.png" class="wip-image" alt="Work In Progress">
    </div>

</body>
</html>
