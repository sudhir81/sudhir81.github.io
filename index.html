<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TerraForge Cloud — Coming Soon</title>
<style>
  /* Basic reset */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}

  /* Page background (full-screen panda) */
  body{
    font-family:Inter, "Segoe UI", Roboto, Arial, sans-serif;
    background: url('assets/Panda.png') center/cover no-repeat fixed;
    color:#e6eefc;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* header nav */
  .topbar{
    position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;
    justify-content:flex-end;padding:0 28px;z-index:30;
    color:#8e6b51; font-weight:600; letter-spacing:0.2px;
    pointer-events:none; /* so nav doesn't intercept heli clicks while testing */
  }
  .topbar a{color:#8e6b51;margin-left:18px;text-decoration:none;pointer-events:auto}

  /* central hero container */
  .hero{
    min-height:100vh;display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:160px; /* keep hero content lower on screen */
    position:relative; z-index:10;
    text-align:center;
  }

  .card{
    width:min(920px,92%);padding:28px; border-radius:20px;
    background:linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.28));
    backdrop-filter: blur(10px) saturate(120%);
    box-shadow:0 12px 40px rgba(2,6,23,0.6);
    margin-bottom:10vh;
  }

  .brand{
    font-size:44px; font-weight:800; color: #a8b3ff;
    text-shadow: 0 4px 18px rgba(70,60,180,0.25);
    display:flex;align-items:center;justify-content:center;gap:14px;
  }
  .tag{ color:#d4defb; margin:10px 0 22px; font-size:18px; }

  .cta{
    display:inline-block;padding:14px 28px;border-radius:14px;
    background:linear-gradient(90deg,#84a3ff,#b88ef6);
    color:#051126;font-weight:700;text-decoration:none;box-shadow:0 10px 28px rgba(66,96,255,0.18);
  }

  /* helicopter + smoke container (absolute) */
  .sky {
    position: absolute;
    left:-18%; top:8%;
    width:120%; height:220px; pointer-events:none; z-index:15;
  }
  .heli {
    position:absolute; top:24px; left:-20%;
    width:220px; transform-origin:center center;
    will-change:transform, left;
    animation: heliFly 8s linear infinite;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.45));
  }

  /* rotor spin using pseudo-element overlay if heli static */
  .heli::after{
    content:""; position:absolute; left:50%; top:4%;
    width:260px; height:20px; transform-origin:center;
    background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.08));
    border-radius:10px; transform:translateX(-50%);
    animation: rotor 0.18s linear infinite;
    opacity:0.85;
    pointer-events:none;
  }

  /* smoke behind heli - will follow heli left offset with a small lag using animation for realism */
  .smoke {
    position:absolute; left:6%; top:110px; width:160px; opacity:0.9; filter:blur(1px);
    animation: smokeFloat 2.5s linear infinite;
    transform-origin:center center; z-index:12;
  }

  @keyframes heliFly {
    0% { left:-20%; transform:translateY(-4px) scale(0.95) rotate(-2deg); }
    50% { left:50%; transform:translateY(-12px) scale(1) rotate(0deg); }
    100% { left:120%; transform:translateY(-4px) scale(0.95) rotate(2deg); }
  }
  @keyframes rotor { 0%{transform:translateX(-50%) rotate(0deg)} 100%{transform:translateX(-50%) rotate(360deg)}}
  @keyframes smokeFloat { 0%{transform:translateY(0) scale(0.95) rotate(-6deg)} 50%{transform:translateY(-8px) scale(1.05) rotate(6deg)} 100%{transform:translateY(0) scale(0.95) rotate(-6deg)} }

  /* WORK IN PROGRESS dropped letters area (bottom center) */
  .dropArea{
    position:fixed; left:50%; transform:translateX(-50%); bottom:46px; z-index:22;
    pointer-events:none; width:100%; max-width:1100px; text-align:center;
  }
  .phrase{
    font-size:34px; font-weight:900; letter-spacing:6px; color:#cbd8ff;
    text-shadow: 0 8px 28px rgba(50,50,110,0.35);
    display:inline-block; padding:6px 12px;
    opacity:0.0;
  }
  .letter{
    display:inline-block; margin:0 3px; font-size:44px; font-weight:900; color:#cfd9ff;
    text-shadow: 0 6px 18px rgba(50,50,110,0.35);
    transform-origin:center top;
  }

  /* strobe blink - toggles color and glow between red, blue, green (create via CSS animation) */
  .strobe{
    animation: strobeColor 0.5s linear 0s 6; /* 6 iterations = 3 color cycles if we toggle each step */
  }
  @keyframes strobeColor{
    0% { color:#ff3b3b; text-shadow: 0 0 24px rgba(255,59,59,0.95); }
    33% { color:#3b8eff; text-shadow: 0 0 24px rgba(59,142,255,0.95); }
    66% { color:#3bff94; text-shadow: 0 0 24px rgba(59,255,148,0.95); }
    100% { color:#cfd9ff; text-shadow: 0 6px 18px rgba(50,50,110,0.35); }
  }

  /* slide out / fade after 5s (controlled by JS adding .slideout) */
  .slideout{ animation: slideDown 0.8s ease forwards; }
  @keyframes slideDown{ to { transform: translateY(60px) scale(0.9); opacity:0; } }

  /* icons bottom-right (whatsapp/email) */
  .floating-icons{position:fixed; right:18px; bottom:18px; display:flex;flex-direction:column; gap:14px; z-index:34}
  .iconSquare{width:62px;height:62px;border-radius:14px;background:linear-gradient(180deg, rgba(0,0,0,0.22), rgba(0,0,0,0.36));
    box-shadow: 0 6px 18px rgba(0,0,0,0.45); display:flex;align-items:center;justify-content:center;}
  .iconSquare img{width:38px;height:38px}

  /* small responsive tweaks */
  @media (max-width:700px){
    .brand{font-size:28px}
    .phrase{font-size:22px}
    .letter{font-size:28px}
    .heli{width:160px}
  }
</style>
</head>
<body>
  <div class="topbar">
    <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
    <a href="https://www.linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
  </div>

  <div class="sky">
    <img class="heli" id="heli" src="assets/heli.png" alt="helicopter">
    <img class="smoke" id="smoke" src="assets/smoke.png" alt="smoke">
  </div>

  <div class="hero">
    <div class="card">
      <div class="brand"><span style="font-size:28px">🐼</span> TerraForge Cloud</div>
      <div class="tag">Welcome — our next-gen cloud platform is under construction.</div>
      <a class="cta" href="https://github.com/sudhir81" target="_blank">🔗 Explore My GitHub Work</a>
    </div>
  </div>

  <!-- drop area (letters will be appended here by JS) -->
  <div class="dropArea" id="dropArea">
    <div id="phraseRoot" class="phrase" aria-hidden="true"></div>
  </div>

  <!-- bottom-right floating icons -->
  <div class="floating-icons">
    <a class="iconSquare" href="https://wa.me/918588818710" target="_blank" title="+91 85888 18710">
      <img src="assets/whatsapp.png" alt="whatsapp">
    </a>
    <a class="iconSquare" href="mailto:support@terraforgecloud.com" title="support@terraforgecloud.com">
      <img src="assets/email.png" alt="email">
    </a>
  </div>

<script>
/*
  JS animation flow:
  - heli moves across via CSS animation 'heliFly'
  - we listen for when heli crosses the screen midpoint (approx 50% of window width)
  - then trigger letter-drop sequence:
     a) letters are created at heli bottom position
     b) each letter animated to landing position (bottom center)
     c) after full phrase formed -> strobe blink (3 color cycles) -> remain 5s -> slide out
  - repeat on each heli pass
*/

const heli = document.getElementById('heli');
const smoke = document.getElementById('smoke');
const phraseRoot = document.getElementById('phraseRoot');
const phrase = "WORK IN PROGRESS";
let running = false;
let cycleDelay = 7000; // total pause between cycles (ms)

/* helper: get absolute element rect center */
function centerOf(el){
  const r = el.getBoundingClientRect();
  return {x: r.left + r.width/2, y: r.top + r.height/2, w:r.width, h:r.height};
}

/* compute bottom target coordinates (center bottom) */
function landingCoord(){
  const x = window.innerWidth/2;
  const y = window.innerHeight - 70; // 70px above bottom
  return {x,y};
}

/* create and drop letters from heli position */
async function dropLettersFromHeli(){
  if(running) return;
  running = true;
  phraseRoot.innerHTML = ""; phraseRoot.style.opacity = 1;

  const center = centerOf(heli);
  const landing = landingCoord();

  const letters = [];
  // create letter elements but don't show yet
  for(let i=0;i<phrase.length;i++){
    const ch = phrase[i];
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    span.style.position = 'fixed';
    // start at heli bottom center
    span.style.left = (center.x - 10) + 'px';
    span.style.top  = (center.y + center.h/2 + 4) + 'px';
    span.style.opacity = 0;
    document.body.appendChild(span);
    letters.push(span);
  }

  // animate each letter sequentially (typewriter drop)
  for(let i=0;i<letters.length;i++){
    const el = letters[i];
    const delay = i * 120; // ms between letters
    await new Promise(res => setTimeout(res, delay));
    el.style.transition = 'transform 700ms cubic-bezier(.22,.9,.3,1), left 700ms ease, top 700ms ease, opacity 200ms';
    el.style.opacity = 1;
    // compute target x offset per letter (spread centered)
    const totalWidth = (letters.length * 36) + (letters.length-1)*6; // approx
    const startX = landing.x - (totalWidth/2) + (i*36) + (i*6);
    const targetY = landing.y;
    // animate using transform and left/top
    el.style.left = startX + 'px';
    el.style.top  = (targetY - 8) + 'px';
    el.style.transform = 'translateY(0) rotate(0deg) scale(1)';
  }

  // wait for letters to land
  await new Promise(res => setTimeout(res, 900));

  // add strobe class to whole phrase: create a wrapper visual
  const wrapper = document.createElement('span');
  wrapper.className = 'strobe';
  // move letters into wrapper (for easier toggling)
  const container = document.createElement('div');
  container.style.display = 'inline-block';
  letters.forEach(l => {
    container.appendChild(l);
  });
  phraseRoot.appendChild(container);
  phraseRoot.style.opacity = 1;

  // strobe blink: we want 3 color cycles; strobeColor anim is 0.5s and repeats 6 times defined in CSS
  // Wait total strobe duration (~0.5s * 6 = 3s)
  // Do this by toggling the 'strobe' class on the container
  container.classList.add('strobe');
  await new Promise(res => setTimeout(res, 3000));

  // keep visible for 5 seconds
  await new Promise(res => setTimeout(res, 5000));

  // slide out animation (fade)
  container.classList.remove('strobe');
  container.classList.add('slideout');

  // cleanup: remove letters after animation
  await new Promise(res => setTimeout(res, 900));
  container.remove();
  // remove any floating letters if still present
  letters.forEach(l => { if(l.parentNode) l.parentNode.removeChild(l); });

  running = false;
}

/* determine when heli crosses midpoint.
   We'll poll heli's bounding rect every 120ms and trigger drop when its center crosses window midpoint and not already triggered for that pass.
   Because heli's CSS animation is continuous, we need to detect left→right passes:  we look for direction sign change by tracking prevX.
*/
let prevHeliX = -9999;
let passTriggered = false;
setInterval(()=>{
  const r = heli.getBoundingClientRect();
  const centerX = r.left + r.width/2;
  const mid = window.innerWidth/2;

  // detect crossing left-to-right: prevX < mid && centerX >= mid
  if(prevHeliX < mid && centerX >= mid && !passTriggered){
    passTriggered = true;
    dropLettersFromHeli();
    // reset pass after a while so next fly will trigger again
    setTimeout(()=>{ passTriggered = false }, 5600); // after drop completes
  }
  prevHeliX = centerX;
}, 120);

/* small tweak: smoke position will follow heli with a slight offset - we update smoke left each tick */
setInterval(()=>{
  const r = heli.getBoundingClientRect();
  // place smoke slightly behind heli
  smoke.style.left = (r.left + r.width*0.06) + 'px';
  smoke.style.top  = (r.top + r.height*0.55) + 'px';
}, 80);

/* Responsive: recompute if user resizes */
window.addEventListener('resize', ()=>{ prevHeliX = -9999; });

</script>
</body>
</html>
