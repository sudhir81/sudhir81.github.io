<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TerraForge Cloud — Coming Soon</title>

<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    background: #000;
    color: white;
  }

  /* FULLSCREEN VIDEO BACKGROUND */
  #bg-video {
    position: fixed;
    top: 0; 
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -10;
    opacity: 0.85;
  }

  /* TOP LINKS */
  .top-links {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 20px;
    font-weight: 600;
    z-index: 10;
  }
  .top-links a {
    margin-left: 20px;
    color: #c77b30; /* brown */
    text-decoration: none;
  }
  .top-links a:hover {
    opacity: 0.6;
  }

  /* MAIN TEXT */
  .center-box {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }
  .title {
    font-size: 42px;
    font-weight: 700;
    color: #caaaff;
  }
  .subtitle {
    font-size: 18px;
    margin-top: -10px;
    color: #f0f0f0;
  }
  .btn {
    margin-top: 20px;
    padding: 14px 28px;
    background: linear-gradient(45deg, #6a82fb, #b46ff9);
    border-radius: 12px;
    color: black;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    border: none;
  }

  /* SIDE CONTACT ICONS */
  .icon-box {
    position: fixed;
    bottom: 40px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    z-index: 20;
  }
  .glass-icon {
    width: 65px;
    height: 65px;
    background: rgba(0,0,0,0.38);
    border-radius: 18px;
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  .glass-icon img {
    width: 70%;
    filter: drop-shadow(0 0 6px #00ffff);
  }

  /* WORK IN PROGRESS TEXT */
  #wip {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 46px;
    font-weight: bold;
    color: white;
    opacity: 0;
    z-index: 12;
  }

  /* Color strobe animation */
  @keyframes strobe {
    0%   { color: red; }
    33%  { color: dodgerblue; }
    66%  { color: lime; }
    100% { color: white; }
  }
</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video id="bg-video" autoplay muted loop playsinline>
  <source src="https://raw.githubusercontent.com/sudhir81/sudhir81.github.io/main/assets/heli_loop.mp4" type="video/mp4">
</video>

<!-- TOP LINKS -->
<div class="top-links">
  <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
  <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
</div>

<!-- CENTER TEXT -->
<div class="center-box">
  <div class="title">🐼 TerraForge Cloud</div>
  <div class="subtitle">Welcome — our next-gen cloud platform is under construction.</div>
  <button class="btn" onclick="window.open('https://github.com/sudhir81')">🔗 Explore My GitHub Work</button>
</div>

<!-- WORK IN PROGRESS TEXT -->
<div id="wip">WORK IN PROGRESS</div>

<!-- WHATSAPP + EMAIL ICONS -->
<div class="icon-box">
  <div class="glass-icon" onclick="window.open('https://wa.me/918588818710')">
    <img src="assets/whatsapp.png" />
  </div>
  <div class="glass-icon" onclick="window.location.href='mailto:support@terraforgecloud.com'">
    <img src="assets/email.png" />
  </div>
</div>

<script>
  const video = document.getElementById("bg-video");
  const wip = document.getElementById("wip");

  function showWIP() {
    wip.style.opacity = 1;
    wip.style.animation = "strobe 0.3s infinite";
    
    setTimeout(() => {
      wip.style.opacity = 0;
      wip.style.animation = "none";
    }, 5500);
  }

  // Trigger midway through video loop
  video.addEventListener("timeupdate", () => {
    if (video.currentTime >= video.duration * 0.5 &&
        video.currentTime <= video.duration * 0.5 + 0.1) {
      showWIP();
    }
  });
</script>

</body>
</html>
