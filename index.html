<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerraForge Cloud</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
        background: url("assets/Panda.png") no-repeat center center / cover;
        height: 100vh;
        overflow: hidden;
        text-align: center;
        color: white;
    }

    /* Top Links */
    .top-links {
        position: absolute;
        top: 25px;
        right: 40px;
        font-size: 20px;
    }
    .top-links a {
        margin-left: 20px;
        color: #d0d0ff;
        text-decoration: none;
        font-weight: 500;
    }
    .top-links a:hover {
        text-decoration: underline;
    }

    /* Title & Subtitle – moved lower */
    .content {
        margin-top: 43vh;   /* <— Adjusted lower so panda face stays visible */
    }

    h1 {
        font-size: 60px;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(to right, #7bb0ff, #b98bff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .subtitle {
        font-size: 22px;
        margin-top: 10px;
        opacity: 0.95;
    }

    .btn {
        margin-top: 25px;
        padding: 14px 32px;
        font-size: 20px;
        font-weight: 600;
        background: linear-gradient(to right, #6aa8ff, #c38bff);
        color: #0e0e0e;
        border-radius: 12px;
        border: none;
        cursor: pointer;
    }
    .btn:hover {
        opacity: 0.85;
    }

    /* WORK IN PROGRESS — Typewriter + Blink + Slide away */
    #wip {
        position: absolute;
        bottom: 70px;
        width: 100%;
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 2px;
        animation: typewriter 4s steps(25) 1,
                   blinkColors 0.8s 4s 3,
                   slideAway 1.4s 6.5s forwards;
    }

    /* Typewriter Effect */
    @keyframes typewriter {
        from { width: 0; opacity: 0; }
        to   { width: 100%; opacity: 1; }
    }

    /* Color Blinking: Red → Blue → Green */
    @keyframes blinkColors {
        0%   { color: red; }
        33%  { color: blue; }
        66%  { color: green; }
        100% { color: red; }
    }

    /* Slide Away Animation */
    @keyframes slideAway {
        0%   { opacity: 1; }
        25%  { transform: translateX(-50px); opacity: 0.6; }
        50%  { transform: translateX(50px); opacity: 0.4; }
        100% { transform: translateY(120px); opacity: 0; }
    }

</style>
</head>

<body>

<div class="top-links">
    <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
    <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
</div>

<div class="content">
    <h1>🐼 TerraForge Cloud</h1>
    <div class="subtitle">Welcome — our next-gen cloud platform is under construction.</div>

    <button class="btn" onclick="window.open('https://github.com/sudhir81','_blank');">
        🔗 Explore My GitHub Work
    </button>
</div>

<!-- WORK IN PROGRESS — animated -->
<div id="wip">WORK IN PROGRESS</div>

<!-- Restart Loop -->
<script>
    function restartAnimation() {
        const el = document.getElementById("wip");
        el.style.animation = "none";
        void el.offsetWidth; 
        el.style.animation = null;
    }
    setInterval(restartAnimation, 8000);
</script>

</body>
</html>
