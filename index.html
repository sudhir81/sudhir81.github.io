<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TerraForge Cloud – Coming Soon</title>

<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Arial", sans-serif;
        color: white;
    }

    /* Background Video */
    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
    }

    /* Top right navigation */
    .top-links {
        position: fixed;
        top: 25px;
        right: 35px;
        font-size: 1.2rem;
        font-weight: bold;
        z-index: 20;
    }

    .top-links a {
        margin-left: 20px;
        text-decoration: none;
        color: #a020f0; /* Dark Purple */
        transition: 0.3s;
    }

    .top-links a:hover {
        color: white;
    }

    /* Center Content */
    .content {
        position: absolute;
        top: 57%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 90%;
    }

    h1 {
        font-size: 3rem;
        font-weight: 800;
        margin: 0;
        text-shadow: 0px 0px 10px black;
    }

    p {
        font-size: 1.2rem;
        margin-top: 8px;
        text-shadow: 0px 0px 6px black;
    }

    /* Button */
    .btn {
        margin-top: 20px;
        padding: 14px 28px;
        background: linear-gradient(90deg, #7d5fff, #a29bfe);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        color: black;
        font-size: 1rem;
        font-weight: bold;
        box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.08);
        background: linear-gradient(90deg, #a29bfe, #7d5fff);
    }

    /* Social Icons */
    .icon-container {
        position: fixed;
        right: 20px;
        bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 20;
    }

    .icon-container img {
        width: 55px;
        height: 55px;
        padding: 10px;
        background: rgba(0,0,0,0.45);
        border-radius: 16px;
        backdrop-filter: blur(4px);
        cursor: pointer;
        transition: 0.3s;
    }

    .icon-container img:hover {
        transform: scale(1.15);
        background: rgba(0,0,0,0.7);
    }

</style>
</head>

<body>

<!-- Video Background -->
<video id="bg-video" autoplay muted loop playsinline>
    <source src="assets/heli_loop.mp4" type="video/mp4">
</video>

<!-- Top Navigation -->
<div class="top-links">
    <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
    <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
</div>

<!-- Main Content -->
<div class="content">
    <h1>TerraForge Cloud</h1>
    <p>Welcome — our next-gen cloud platform is under construction.</p>

    <a href="https://github.com/sudhir81" target="_blank">
        <button class="btn">🔗 Explore My GitHub Work</button>
    </a>
</div>

<!-- Floating WhatsApp + Email Icons -->
<div class="icon-container">
    <a href="https://wa.me/918588818710" target="_blank">
        <img src="assets/whatsapp.png" alt="WhatsApp">
    </a>

    <a href="mailto:support@terraforgecloud.com">
        <img src="assets/email.png" alt="Email">
    </a>
</div>

</body>
</html>
