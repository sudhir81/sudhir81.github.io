<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerraForge Cloud - Under Construction</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
        background-size: 300% 300%;
        animation: gradientMotion 12s ease infinite;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    @keyframes gradientMotion {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        padding: 45px;
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        max-width: 750px;
        width: 90%;
        animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    img.hero {
        width: 100%;
        max-width: 450px;
        border-radius: 12px;
        animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0); }
    }

    h1 {
        font-size: 2.5rem;
        margin-top: 20px;
        background: linear-gradient(to right, #38bdf8, #60a5fa, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0px 0px 15px rgba(255,255,255,0.2);
    }

    p {
        font-size: 1.2rem;
        margin-bottom: 20px;
        color: #e2e8f0;
    }

    .btn-github {
        background: #38bdf8;
        padding: 12px 22px;
        border-radius: 8px;
        color: #0f172a;
        font-weight: bold;
        text-decoration: none;
        font-size: 1.1rem;
        transition: 0.3s;
        display: inline-block;
        margin-top: 10px;
        box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
    }

    .btn-github:hover {
        background: #0ea5e9;
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(56, 189, 248, 0.6);
    }

    img.wip {
        width: 70%;
        max-width: 350px;
        margin-top: 25px;
        border-radius: 10px;
        opacity: 0.9;
    }
</style>

</head>
<body>

<div class="card">
    <img class="hero" src="https://i.imgur.com/8vj2Jlm.jpeg" alt="Kung Fu Panda">

    <h1>🐼 TerraForge Cloud</h1>

    <p>
        Our website is evolving!  
        Something awesome is being forged in the cloud.  
        Until then, check out my work:
    </p>

    <a class="btn-github" href="https://github.com/sudhir81" target="_blank">
        🔗 Visit Sudhir Dalvi on GitHub
    </a>

    <img class="wip" src="https://i.imgur.com/tmT03h3.png" alt="Work in Progress">
</div>

</body>
</html>
