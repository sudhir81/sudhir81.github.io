<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraForge Cloud – Coming Soon</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* CLEAR FULL-SCREEN PANDA BACKGROUND */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("assets/Panda.png") no-repeat center center / cover;
            z-index: -1;
        }

        /* NAV BAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: #bcd2ff;
            margin: 0 12px;
            text-decoration: none;
            font-weight: 500;
        }

        .logo {
            height: 42px;
        }

        /* TEXT CONTENT (NO BOX) */
        .content {
            margin-top: 160px;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 3px 10px rgba(0,0,0,0.55);
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 25px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.45);
        }

        /* BUTTON */
        .btn {
            padding: 14px 28px;
            background: #58a6ff;
            border-radius: 12px;
            text-decoration: none;
            color: #000;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
        }

        /* WIP BLINKING IMAGE */
        .wip-container {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
        }

        .wip-image {
            width: 260px;
            animation: blink 1.3s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.40; }
            to { opacity: 1; }
        }

    </style>
</head>

<body>

    <div class="navbar">
        <img src="assets/logo.png" class="logo">
        <div>
            <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
        </div>
    </div>

    <div class="content">
        <h1>🐼 TerraForge Cloud</h1>
        <p class="subtitle">Our next-gen cloud platform is under construction.</p>
        <a class="btn" href="https://github.com/sudhir81" target="_blank">🔗 Explore My GitHub Work</a>
    </div>

    <!-- BLINKING WIP -->
    <div class="wip-container">
        <img src="assets/WIP.png" class="wip-image" alt="Work In Progress">
    </div>

</body>
</html>
