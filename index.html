<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TerraForge Cloud — Engineering the Future</title>

<link rel="icon" href="assets/logo_tf.png">
<link rel="stylesheet" href="assets/styles.css">
<style>
  /* ── Reveal-on-scroll ── */
  .reveal {
    opacity: 0;
    transform: translateY(26px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Section intro ── */
  .section-sub {
    margin: -6px 0 26px;
    color: rgba(255,255,255,0.55);
    font-size: 14.5px;
  }

  /* ── At-a-glance stat tiles ── */
  .stat-tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 18px;
    margin: 8px 0 56px;
  }

  .stat-tile {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 26px 18px;
    text-align: center;
    text-decoration: none;
    display: block;
    transition: 0.3s;
  }

  .stat-tile:hover {
    transform: translateY(-6px);
    border-color: rgba(0,213,255,0.35);
    box-shadow: 0 16px 36px rgba(0,213,255,0.12);
  }

  .stat-tile .num {
    font-size: 34px;
    font-weight: 900;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-tile .lbl {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-top: 6px;
  }

  .stat-tile .go {
    display: block;
    margin-top: 10px;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent1);
    opacity: 0;
    transform: translateY(4px);
    transition: 0.25s;
  }

  .stat-tile:hover .go {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Flip tiles ── */
  .domain-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 22px;
  }

  .tile {
    perspective: 1200px;
    height: 240px;
    cursor: pointer;
  }

  .tile-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.7s cubic-bezier(.4,.2,.2,1);
    transform-style: preserve-3d;
  }

  .tile:hover .tile-inner,
  .tile.flipped .tile-inner {
    transform: rotateY(180deg);
  }

  .tile-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 26px;
    display: flex;
    flex-direction: column;
  }

  .tile-front {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
  }
