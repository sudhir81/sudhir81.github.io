<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TerraForge Cloud – Coming Soon</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            background: url("assets/Panda.png") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 42px;
            text-shadow: 0 0 12px black;
        }

        .button {
            background: #4da3ff;
            color: white;
            padding: 12px 24px;
            margin-top: 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
            display: inline-block;
            transition: 0.2s;
        }

        .button:hover {
            background: #1b76d1;
        }

        /* WIP Image blink */
        .wip-blink {
            animation: pulse 1.3s infinite alternate;
            width: 260px;
            margin-top: 25px;
        }

        @keyframes pulse {
            from { opacity: 0.55; }
            to   { opacity: 1; }
        }

        /* Contact icons */
        .contact-section {
            margin-top: 35px;
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        .contact-icon {
            width: 48px;
            transition: 0.25s;
            filter: drop-shadow(0px 0px 4px black);
        }

        .contact-icon:hover {
            transform: scale(1.18);
            filter: drop-shadow(0px 0px 9px white);
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>🐼 TerraForge Cloud</h1>
        <p>Welcome! Our next-gen cloud platform is under construction.</p>

        <a class="button" href="https://github.com/sudhir81" target="_blank">
            🔗 Explore My GitHub Work
        </a>

        <div>
            <img src="assets/WIP.png" class="wip-blink" alt="Work in Progress" />
        </div>

        <!-- Contact Icons -->
        <div class="contact-section">

            <!-- WhatsApp -->
            <a href="https://wa.me/918588818710" target="_blank">
                <img src="assets/whatsapp.png" class="contact-icon" alt="WhatsApp" />
            </a>

            <!-- Email -->
            <a href="mailto:support@terraforgecloud.com">
                <img src="assets/email.png" class="contact-icon" alt="Email" />
            </a>

        </div>
    </div>
</body>
</html>
