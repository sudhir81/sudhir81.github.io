<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TerraForge Cloud</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* Smooth Fade-in Animation */
        .fade-in {
            animation: fadeIn 1.6s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navigation Header */
        nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            font-size: 18px;
        }

        nav a {
            color: #9ecfff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px #75a7ff;
        }

        /* Logo */
        .logo {
            width: 80px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4));
            margin-top: 10px;
        }

        /* Glassmorphism Card */
        .card {
            margin: auto;
            margin-top: 30px;
            max-width: 700px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .hero-image {
            width: 60%;
            max-width: 400px;
            animation: float 4s ease-in-out infinite;
        }

        /* Floating Animation */
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .wip-image {
            width: 260px;
            margin-top: 35px;
            opacity: 0.85;
        }

        /* Countdown */
        #countdown {
            font-size: 26px;
            font-weight: bold;
            margin: 20px 0;
            color: #a8caff;
            text-shadow: 0 0 10px #4c8bff;
        }

        /* Button */
        .btn {
            background: linear-gradient(135deg, #4ea8ff, #1e90ff);
            padding: 15px 30px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>

    <!-- NAVIGATION -->
    <nav class="fade-in">
        <a href="https://github.com/sudhir81" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/sudhir-dalvi" target="_blank">LinkedIn</a>
    </nav>

    <!-- LOGO -->
    <img src="assets/logo.png" class="logo fade-in" />

    <!-- MAIN CARD -->
    <div class="card fade-in">
        <img src="assets/Panda.png" class="hero-image" alt="Panda" />

        <h1 style="font-size: 40px; margin-top: 15px;">
            🐼 TerraForge Cloud
        </h1>

        <p style="font-size: 18px; opacity: 0.85;">
            Welcome! Our next-gen cloud platform is almost ready.
        </p>

        <!-- COUNTDOWN -->
        <div id="countdown">Loading...</div>

        <a href="https://github.com/sudhir81" target="_blank" class="btn">
            🔗 Explore My GitHub Work
        </a>

        <img src="assets/WIP.png" class="wip-image fade-in" alt="Work in Progress" />
    </div>

    <script>
        // Countdown Timer (10 days from now)
        function countdownTimer() {
            const launchDate = new Date();
            launchDate.setDate(launchDate.getDate() + 10);

            setInterval(() => {
                const now = new Date().getTime();
                const diff = launchDate - now;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((diff / (1000 * 60)) % 60);
                const seconds = Math.floor((diff / 1000) % 60);

                document.getElementById("countdown").textContent =
                    `Launching In: ${days} Days ${hours} Hours ${minutes} Minutes ${seconds} Sec`;
            }, 1000);
        }

        countdownTimer();
    </script>

</body>
</html>
