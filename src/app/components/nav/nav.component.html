<div class="container nav">
  <a class="brand" routerLink="/">
    <img src="assets/logo_tf.png" alt="TerraForge Logo">
    <span>TerraForge Cloud</span>
  </a>

  <button class="hamburger" (click)="toggleMenu()" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="menu" [ngClass]="{ 'open': menuOpen }">
    <a routerLink="/"           routerLinkActive="active-link" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a>
    <a routerLink="/services"   routerLinkActive="active-link" (click)="closeMenu()">Services</a>
    <a routerLink="/leadership" routerLinkActive="active-link" (click)="closeMenu()">Leadership</a>
    <a routerLink="/founder"    routerLinkActive="active-link" (click)="closeMenu()">Founder</a>
    <a routerLink="/cases"      routerLinkActive="active-link" (click)="closeMenu()">Case Studies</a>
    <a routerLink="/projects"   routerLinkActive="active-link" (click)="closeMenu()">Projects</a>
    <a routerLink="/partners"   routerLinkActive="active-link" (click)="closeMenu()">Partners</a>
    <a routerLink="/faq"        routerLinkActive="active-link" (click)="closeMenu()">FAQ</a>
    <a routerLink="/contact"    routerLinkActive="active-link" (click)="closeMenu()">Contact</a>
  </nav>
</div>
